name: test

on:
  push:
    branches: [main]
jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: quarto-dev/quarto-actions/setup@v2
      - uses: quarto-dev/quarto-actions/render@v2
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: pdf-test
          path: project.pdf
